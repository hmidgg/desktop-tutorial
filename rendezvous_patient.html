<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rendez-vous Patient</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-color: #fff;
      font-family: Arial, sans-serif;
      color: #333;
    }
    .navbar {
      background-color: #003366;
    }
    .navbar-brand {
      color: white !important;
      transition: 0.3s ease;
    }
    .navbar-brand:hover {
      color: #28a745 !important;
      text-decoration: underline;
    }
    .container-main {
      margin-top: 80px;
      margin-bottom: 60px;
    }
    h2 {
      color: #003366;
      margin-bottom: 30px;
    }
    .btn-blue-royal {
      background-color: #003366;
      color: white;
      border: none;
      transition: 0.3s;
    }
    .btn-blue-royal:hover {
      background-color: #28a745;
      color: white;
    }
    .card {
      margin-bottom: 15px;
    }
    .form-label {
      color: #003366;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html">Centre Médical</a>
    </div>
  </nav>

  <div class="container container-main">
    <h2>Mes Rendez-vous</h2>

    <!-- Liste des rendez-vous existants (exemple statique) -->
    <div id="appointmentsList" class="mb-5">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title">Dr. Ahmed Ben Salah</h5>
          <p class="card-text">
            Spécialité: Cardiologie <br />
            Date: 2025-07-22 <br />
            Salle: 101
          </p>
        </div>
      </div>
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title">Dr. Fatma Trabelsi</h5>
          <p class="card-text">
            Spécialité: Dermatologie <br />
            Date: 2025-08-01 <br />
            Salle: 204
          </p>
        </div>
      </div>
    </div>

    <h2>Prendre un nouveau rendez-vous</h2>
    <form id="appointmentForm" onsubmit="return submitAppointment()">
      <div class="mb-3">
        <label for="doctor" class="form-label">Médecin</label>
        <select id="doctor" class="form-select" required onchange="updateSpecialties()">
          <option value="" selected disabled>-- Choisir un médecin --</option>
          <option value="ahmed_bensalah">Dr. Ahmed Ben Salah</option>
          <option value="fatma_trabelsi">Dr. Fatma Trabelsi</option>
          <option value="karim_masmoudi">Dr. Karim Masmoudi</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="specialty" class="form-label">Spécialité</label>
        <select id="specialty" class="form-select" required>
          <option value="" selected disabled>-- Choisir une spécialité --</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="date" class="form-label">Date du rendez-vous</label>
        <input
          type="date"
          id="date"
          class="form-control"
          required
          min=""
          max=""
        />
        <small class="form-text text-muted">
          Choisissez une date disponible
        </small>
      </div>

      <button type="submit" class="btn btn-blue-royal">Valider le rendez-vous</button>
    </form>
  </div>

  <script>
    // Spécialités selon médecin
    const specialtiesByDoctor = {
      ahmed_bensalah: ["Cardiologie"],
      fatma_trabelsi: ["Dermatologie", "Allergologie"],
      karim_masmoudi: ["Neurologie", "Psychiatrie"],
    };

    // Dates disponibles par médecin (exemple)
    const availableDatesByDoctor = {
      ahmed_bensalah: ["2025-07-20", "2025-07-22", "2025-07-25"],
      fatma_trabelsi: ["2025-07-30", "2025-08-01", "2025-08-05"],
      karim_masmoudi: ["2025-07-28", "2025-08-02", "2025-08-10"],
    };

    const doctorSelect = document.getElementById("doctor");
    const specialtySelect = document.getElementById("specialty");
    const dateInput = document.getElementById("date");

    function updateSpecialties() {
      const selectedDoctor = doctorSelect.value;
      // Nettoyer spécialités
      specialtySelect.innerHTML = '<option value="" selected disabled>-- Choisir une spécialité --</option>';

      if (selectedDoctor && specialtiesByDoctor[selectedDoctor]) {
        specialtiesByDoctor[selectedDoctor].forEach((spec) => {
          const option = document.createElement("option");
          option.value = spec.toLowerCase();
          option.textContent = spec;
          specialtySelect.appendChild(option);
        });
      }

      updateDateLimits();
    }

    function updateDateLimits() {
      const selectedDoctor = doctorSelect.value;
      if (selectedDoctor && availableDatesByDoctor[selectedDoctor]) {
        const dates = availableDatesByDoctor[selectedDoctor];
        const minDate = dates[0];
        const maxDate = dates[dates.length - 1];
        dateInput.min = minDate;
        dateInput.max = maxDate;
        dateInput.value = "";
      } else {
        dateInput.min = "";
        dateInput.max = "";
        dateInput.value = "";
      }
    }

    function submitAppointment() {
      const doctor = doctorSelect.options[doctorSelect.selectedIndex]?.text;
      const specialty = specialtySelect.options[specialtySelect.selectedIndex]?.text;
      const date = dateInput.value;

      if (!doctor || !specialty || !date) {
        alert("Veuillez remplir tous les champs correctement.");
        return false;
      }

      // Vérifier si la date est dans les dates disponibles
      const selectedDoctor = doctorSelect.value;
      if (!availableDatesByDoctor[selectedDoctor].includes(date)) {
        alert("La date sélectionnée n'est pas disponible pour ce médecin.");
        return false;
      }

      alert(`Rendez-vous pris avec ${doctor} (${specialty}) le ${date}.`);
      // Ici, tu peux ajouter le code pour enregistrer le rendez-vous (API, backend...)

      // Pour la démo, reset le formulaire
      document.getElementById("appointmentForm").reset();
      specialtySelect.innerHTML = '<option value="" selected disabled>-- Choisir une spécialité --</option>';
      dateInput.min = "";
      dateInput.max = "";

      return false; // Empêche le rechargement
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
