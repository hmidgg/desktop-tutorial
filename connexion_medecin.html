<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connexion Médecin</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    body {
      background-color: #ffffff;
      font-family: Arial, sans-serif;
      color: #333;
    }
    .navbar {
      background-color: #003366;
    }
    .navbar-brand {
      color: white !important;
      transition: 0.3s ease;
    }
    .navbar-brand:hover {
      color: #28a745 !important;
      text-decoration: underline;
    }
    .login-container {
      background-color: #f8f9fa;
      padding: 40px;
      border-radius: 10px;
      margin-top: 100px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      max-width: 450px;
      margin-left: auto;
      margin-right: auto;
    }
    .form-label {
      color: #003366;
    }
    .btn-blue-royal {
      background-color: #003366;
      color: white;
      border: none;
      transition: 0.3s;
    }
    .btn-blue-royal:hover {
      background-color: #28a745;
      color: white;
    }
    a.link-dark:hover {
      color: #28a745 !important;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html">Centre Médical</a>
    </div>
  </nav>

  <div class="login-container text-center">
    <h2 style="color: #003366;">Connexion Médecin</h2>
    <form id="loginForm" action="#" method="POST" onsubmit="return validateForm()">
      <div class="mb-3 text-start">
        <label for="email" class="form-label">Adresse Email</label>
        <input
          type="email"
          class="form-control"
          id="email"
          name="email"
          placeholder="exemple@medecin.com"
        />
      </div>
      <div class="mb-3 text-start">
        <label for="password" class="form-label">Mot de passe</label>
        <input
          type="password"
          class="form-control"
          id="password"
          name="password"
          placeholder="********"
        />
      </div>
      <button type="submit" class="btn btn-blue-royal w-100">Se connecter</button>
    </form>
    <p class="mt-3">
      Pas encore de compte ? 
      <a href="creation_compte_medecin.html" class="link-dark">Créer un compte</a>
    </p>
  </div>

  <script>
    function validateForm() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (email === "") {
        alert("Veuillez saisir votre adresse email.");
        return false;
      }
      if (password === "") {
        alert("Veuillez saisir votre mot de passe.");
        return false;
      }

      // Redirection après validation
      window.location.href = "rendezvous_medecin.html"; // page rendez-vous médecin à créer
      return false;
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
